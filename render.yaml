# Render blueprint for the METFLIX API (NestJS).
# Database lives on Neon (free serverless Postgres); the web app is on Vercel.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: metflix-api
    runtime: node
    plan: free
    rootDir: .
    buildCommand: npm install && npm run build:api
    # Seed is idempotent (upsert by slug) so it is safe to run on every boot.
    startCommand: node apps/api/dist/db/seed.js && node apps/api/dist/main.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the Render dashboard
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false # your Vercel URL, e.g. https://metflix.vercel.app
      - key: ADMIN_DEV_ID
        value: admin
      - key: ADMIN_DEV_PASSWORD
        value: "1234"
