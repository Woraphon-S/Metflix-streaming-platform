services:
  postgres:
    image: postgres:16-alpine
    container_name: metflix-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-metflix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-metflix}
      POSTGRES_DB: ${POSTGRES_DB:-metflix}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-metflix} -d ${POSTGRES_DB:-metflix}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: metflix-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      API_PORT: ${API_PORT:-4000}
      # Inside the compose network the DB host is the "postgres" service, not localhost.
      # Derived from POSTGRES_* so a host-oriented DATABASE_URL in .env (localhost, for
      # non-Docker local dev) can't override it and break the container.
      DATABASE_URL: postgresql://${POSTGRES_USER:-metflix}:${POSTGRES_PASSWORD:-metflix}@postgres:5432/${POSTGRES_DB:-metflix}
      JWT_SECRET: ${JWT_SECRET:-change_me_to_a_long_random_string}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:3000}
      ADMIN_DEV_ID: ${ADMIN_DEV_ID:-admin}
      ADMIN_DEV_PASSWORD: ${ADMIN_DEV_PASSWORD:-1234}
    ports:
      - "${API_PORT:-4000}:4000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
    container_name: metflix-web
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000/api}
    ports:
      - "${WEB_PORT:-3000}:3000"

volumes:
  postgres-data:
